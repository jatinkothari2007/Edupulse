{% extends 'base.html' %}
{% block title %}My Classes — EduPulse{% endblock %}
{% block page_title %}My Classes{% endblock %}
{% block content %}
<div class="page-title">My Classes</div>
<div class="page-subtitle">Classes and subjects you are assigned to teach</div>
<div id="class-cards" class="grid-2" style="gap:16px;margin-top:8px"><div class="skeleton" style="height:160px"></div></div>
{% endblock %}
{% block extra_js %}
<script>
async function onPageReady(){
  const d=await apiCall('/api/teacher/classes');
  const classes=d.classes||[];
  const el=document.getElementById('class-cards');
  if(!classes.length){el.innerHTML='<div class="empty-state"><i class="fas fa-chalkboard"></i><p>No classes assigned yet</p></div>';return;}
  el.innerHTML=classes.map(c=>`
    <div class="glass-card" style="padding:22px">
      <div style="font-weight:700;font-size:16px;margin-bottom:6px">${c.name}</div>
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:14px">${(c.students||[]).length} students · Subjects: ${(c.subjects||[]).join(', ')||'—'}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <a href="/pages/teacher/attendance?classId=${c.id}" class="btn btn-sm btn-primary"><i class="fas fa-calendar-check"></i> Attendance</a>
        <a href="/pages/teacher/marks?classId=${c.id}" class="btn btn-sm btn-secondary"><i class="fas fa-star"></i> Marks</a>
        <a href="/pages/teacher/assignments?classId=${c.id}" class="btn btn-sm" style="background:rgba(245,158,11,0.15);color:#F59E0B;border:1px solid rgba(245,158,11,0.3)"><i class="fas fa-tasks"></i> Assignments</a>
      </div>
    </div>`).join('');
}
</script>
{% endblock %}
